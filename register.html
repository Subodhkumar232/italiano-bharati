<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | Italiano Bharati Academy</title>

    <link rel="stylesheet" href="register.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Background -->
    <div class="background"></div>

    <!-- Registration Card -->

    <div class="container">

        <div class="card">

            <div class="logo">

                <img src="assets/logo.png" alt="Logo">

            </div>

            <h1>Create Your Account</h1>

            <p class="subtitle">
                Join Italiano Bharati Academy and begin your Italian learning journey.
            </p>

            <form id="registerForm">

                <div class="input-box">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="input-box">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-box">
                    <label>Mobile Number</label>
                    <input type="tel" id="phone" placeholder="Enter mobile number" required>
                </div>

                <div class="input-box">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create password" required>
                </div>

                <div class="input-box">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                </div>

                <div class="checkbox">

                    <input type="checkbox" id="terms" required>

                    <label for="terms">
                        I agree to the Terms & Conditions
                    </label>

                </div>

                <button type="submit" class="btn">

                    Create Account

                </button>

            </form>

            <p class="login-link">
    Already have an account?
    <a href="index.html">Login</a>
</p>

        </div>

    </div>

    <script src="register.js"></script>

</body>

</html>
